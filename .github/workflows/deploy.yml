name: Deploy Vite site to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project (frontend)
        run: |
          cd frontend
          pnpm run build

      # 🔍 Debug (ek baar ke liye — baad me hata sakta hai)
      - name: Debug folders
        run: |
          echo "Root:"
          ls -la
          echo "Frontend:"
          ls -la frontend || true
          echo "Find dist folders:"
          find . -type d -name dist

      - name: Copy build files to docs
        run: |
          rm -rf docs
          mkdir docs

          if [ -d "frontend/dist" ]; then
            echo "Using frontend/dist"
            cp -r frontend/dist/* docs/
          elif [ -d "dist" ]; then
            echo "Using root dist"
            cp -r dist/* docs/
          elif [ -d "src/frontend/dist" ]; then
            echo "Using src/frontend/dist"
            cp -r src/frontend/dist/* docs/
          else
            echo "❌ dist folder not found"
            exit 1
          fi

      - name: Commit and push docs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add docs
          git commit -m "Deploy site" || echo "No changes"
          git push
